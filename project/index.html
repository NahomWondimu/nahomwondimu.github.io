<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Loading — Nahom Wondimu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080c10;
  --bg2:     #0d1117;
  --bg3:     #111720;
  --border:  rgba(56,189,248,0.08);
  --border-hover: rgba(56,189,248,0.18);
  --text:    #e8edf2;
  --muted:   #6b7280;
  --subtle:  #2d3748;
  --subtle2: #9ca3af;
  --accent:  #38bdf8;
  --accent-dim:  rgba(56,189,248,0.07);
  --accent-dim2: rgba(56,189,248,0.3);
  --accent-border: rgba(56,189,248,0.22);
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,12,16,0.9);
  backdrop-filter: blur(16px);
}
.nav-logo { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; }
.nav-logo-sep { color: var(--accent); }
.nav-links { display: flex; gap: 8px; list-style: none; }
.nav-links a { font-family: var(--mono); font-size: 12.5px; color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 5px; transition: color 0.15s, background 0.15s; }
.nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-links a.active { color: var(--accent); }
.nav-cta { display: flex; gap: 10px; align-items: center; }
.btn-ghost { font-family: var(--mono); font-size: 12.5px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: none; transition: color 0.15s; }
.btn-ghost:hover { color: var(--text); }
.btn-primary { font-family: var(--mono); font-size: 12.5px; font-weight: 500; color: var(--bg); background: var(--accent); border: none; border-radius: 5px; padding: 7px 14px; cursor: pointer; text-decoration: none; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }

/* LAYOUT */
.container { max-width: 1000px; margin: 0 auto; padding: 0 40px; }

.post-layout {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 60px;
  padding: 100px 0 100px;
  align-items: start;
}

/* PROJECT HEADER */
.post-header {
  padding: 120px 0 48px;
  border-bottom: 1px solid var(--border);
  max-width: 740px;
}

.post-header-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.back-link {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.back-link:hover { color: var(--accent); }

.post-tag {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 3px;
  padding: 2px 8px;
  border: 1px solid;
}
.tag-tool     { color: #38bdf8; border-color: rgba(56,189,248,0.3);  background: rgba(56,189,248,0.07); }
.tag-research { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.07); }
.tag-oss      { color: #34d399; border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.07); }

.post-header h1 {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 300;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 16px;
}

.post-header-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  flex-wrap: wrap;
  margin-top: 16px;
}

.pill {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 8px;
}

.project-links {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.project-link {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid var(--accent-border);
  border-radius: 5px;
  padding: 6px 14px;
  transition: background 0.15s, opacity 0.15s;
}
.project-link:hover { background: var(--accent-dim); }

/* POST BODY */
.post-body {
  max-width: 680px;
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
}

.post-body h1,
.post-body h2,
.post-body h3,
.post-body h4 {
  font-weight: 400;
  letter-spacing: -0.025em;
  color: var(--text);
  margin: 2.2em 0 0.7em;
  line-height: 1.25;
}
.post-body h1 { font-size: 30px; }
.post-body h2 {
  font-size: 22px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.post-body h3 { font-size: 18px; color: var(--subtle2); }
.post-body h4 { font-size: 15px; font-family: var(--mono); color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }

.post-body p { margin-bottom: 1.4em; color: var(--muted); font-weight: 300; }
.post-body p strong { color: var(--text); font-weight: 500; }
.post-body p em { color: var(--subtle2); font-style: italic; }

.post-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; transition: opacity 0.15s; }
.post-body a:hover { opacity: 0.75; }

.post-body ul,
.post-body ol {
  padding-left: 1.5em;
  margin-bottom: 1.4em;
  color: var(--muted);
}
.post-body li { margin-bottom: 0.4em; font-weight: 300; }
.post-body li strong { color: var(--text); font-weight: 500; }

.post-body code {
  font-family: var(--mono);
  font-size: 13.5px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: 3px;
  padding: 1px 6px;
}

.post-body pre {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  overflow-x: auto;
  margin-bottom: 1.6em;
  position: relative;
}
.post-body pre code {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  background: none;
  border: none;
  padding: 0;
  line-height: 1.7;
}
.post-body pre::before {
  content: attr(data-lang);
  position: absolute;
  top: 10px; right: 14px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.post-body blockquote {
  border-left: 2px solid var(--accent);
  padding: 16px 20px;
  background: var(--accent-dim);
  border-radius: 0 8px 8px 0;
  margin: 1.6em 0;
}
.post-body blockquote p {
  color: var(--text) !important;
  font-style: italic;
  margin-bottom: 0 !important;
}

.post-body table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1.6em;
  font-size: 14px;
}
.post-body th {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 10px 14px;
  border-bottom: 1px solid var(--accent-border);
  text-align: left;
}
.post-body td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-weight: 300;
}
.post-body tr:hover td { background: var(--bg2); }

.post-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2.5em 0;
}

.post-body img {
  max-width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin: 1.4em 0;
  display: block;
}

/* TOC SIDEBAR */
.toc-sidebar { position: sticky; top: 80px; }

.toc-label {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

#toc { list-style: none; }
#toc li { margin-bottom: 2px; }
#toc a {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  display: block;
  padding: 5px 8px;
  border-radius: 4px;
  border-left: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  line-height: 1.4;
}
#toc a:hover { color: var(--text); background: rgba(255,255,255,0.03); }
#toc a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }
#toc a.toc-h3 { padding-left: 20px; font-size: 11.5px; }

.toc-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* LOADING */
.post-loading {
  padding: 80px 0;
  text-align: center;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
}
.post-loading::after {
  content: '';
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--accent);
  vertical-align: middle;
  margin-left: 6px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* FOOTER */
footer { border-top: 1px solid var(--border); padding: 36px 0; margin-top: 0; }
.footer-inner { display: flex; justify-content: space-between; align-items: center; }
.footer-links { display: flex; gap: 28px; }
.footer-links a { font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.15s; }
.footer-links a:hover { color: var(--accent); }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .container { padding: 0 20px; }
  .post-layout { grid-template-columns: 1fr; gap: 40px; }
  .toc-sidebar { display: none; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .footer-links { flex-wrap: wrap; justify-content: center; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">NW<span class="nav-logo-sep">//</span>sec</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/writeups">Writeups</a></li>
    <li><a href="/feed">Intel Feed</a></li>
    <li><a href="/#about">About</a></li>
  </ul>
  <div class="nav-cta">
    <a href="https://github.com" class="btn-ghost" target="_blank">GitHub ↗</a>
    <a href="/#contact" class="btn-primary">Contact</a>
  </div>
</nav>

<div class="post-header" id="post-header">
  <div class="container">
    <div class="post-loading" id="loading-msg">Loading project</div>
  </div>
</div>

<div class="container">
  <div class="post-layout">
    <article class="post-body" id="post-body"></article>

    <aside class="toc-sidebar" id="toc-sidebar" style="display:none">
      <div class="toc-label">On this page</div>
      <ul id="toc"></ul>
    </aside>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">© 2026 Nahom Wondimu</span>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/writeups">Writeups</a>
        <a href="/feed">Intel Feed</a>
        <a href="/#contact">Contact</a>
      </div>
    </div>
  </div>
</footer>

<script>
function parseFrontmatter(raw) {
  const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, content: raw };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const [key, ...rest] = line.split(':');
    if (key && rest.length) {
      let val = rest.join(':').trim().replace(/^["']|["']$/g, '');
      if (val.startsWith('[') && val.endsWith(']')) {
        val = val.slice(1,-1).split(',').map(s => s.trim());
      }
      meta[key.trim()] = val;
    }
  });
  return { meta, content: match[2] };
}

const typeClass = {
  tool:     'tag-tool',
  research: 'tag-research',
  'open source': 'tag-oss',
  oss:      'tag-oss',
};

function renderHeader(meta) {
  const type = (meta.type || 'tool').toLowerCase();
  const cls = typeClass[type] || 'tag-tool';
  const stack = Array.isArray(meta.stack) ? meta.stack : (meta.stack ? [meta.stack] : []);

  const githubLink = meta.github
    ? `<a href="${meta.github}" class="project-link" target="_blank">GitHub ↗</a>`
    : '';
  const demoLink = meta.demo
    ? `<a href="${meta.demo}" class="project-link" target="_blank">Demo ↗</a>`
    : '';

  document.getElementById('post-header').innerHTML = `
    <div class="container">
      <div class="post-header-eyebrow">
        <a href="/#projects" class="back-link">← Projects</a>
        <span class="post-tag ${cls}">${meta.type || 'Tool'}</span>
      </div>
      <h1>${meta.title || 'Untitled'}</h1>
      ${stack.length ? `<div class="post-header-meta">${stack.map(s => `<span class="pill">${s}</span>`).join('')}</div>` : ''}
      ${(githubLink || demoLink) ? `<div class="project-links">${githubLink}${demoLink}</div>` : ''}
    </div>
  `;
  document.getElementById('page-title').textContent = `${meta.title || 'Project'} — Nahom Wondimu`;
}

function buildTOC() {
  const headings = document.querySelectorAll('.post-body h2, .post-body h3');
  if (headings.length < 2) return;

  const toc = document.getElementById('toc');
  toc.innerHTML = '';

  headings.forEach((h, i) => {
    const id = 'heading-' + i;
    h.id = id;
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('toc-h3');
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    li.appendChild(a);
    toc.appendChild(li);
  });

  document.getElementById('toc-sidebar').style.display = '';

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const link = toc.querySelector(`a[href="#${entry.target.id}"]`);
      if (!link) return;
      if (entry.isIntersecting) {
        toc.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));
}

function labelCodeBlocks() {
  document.querySelectorAll('.post-body pre').forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;
    const cls = [...code.classList].find(c => c.startsWith('language-'));
    if (cls) {
      pre.setAttribute('data-lang', cls.replace('language-', ''));
      code.classList.remove(cls);
    }
  });
}

async function loadProject() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    document.getElementById('loading-msg').textContent = 'No project specified — add ?slug=project-name to the URL';
    return;
  }

  try {
    const res = await fetch(`../projects/${slug}.md`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const raw = await res.text();

    const { meta, content } = parseFrontmatter(raw);
    renderHeader(meta);

    marked.setOptions({ breaks: true, gfm: true });
    document.getElementById('post-body').innerHTML = marked.parse(content);

    labelCodeBlocks();
    buildTOC();

  } catch (err) {
    document.getElementById('post-header').innerHTML = `
      <div class="container">
        <div class="post-header-eyebrow"><a href="/#projects" class="back-link">← Projects</a></div>
        <h1 style="color:var(--muted)">Project not found</h1>
        <div class="post-header-meta"><span>Could not load <code style="font-family:var(--mono);color:var(--accent)">${slug}.md</code> — ${err.message}</span></div>
      </div>
    `;
  }
}

loadProject();
</script>
</body>
</html>
